name: Test npm CLI

on:
  push:
    branches: [main]
    paths:
      - "npm/**"
  pull_request:
    paths:
      - "npm/**"

permissions:
  contents: read

jobs:
  install:
    name: Test CLI installation
    strategy:
      matrix:
        node:
          - 18
          - 20
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: "Get previous version tag"
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@61819f33034117e6c686e6a31dba995a85afc9de" # v2
        with:
          prefix: v
      - id: version
        shell: bash
        run: |
          echo "${{ steps.previoustag.outputs.tag }}" | cut -c2- | tee version.txt
          echo "::set-output name=version::$(cat version.txt)"
      - run: npm ci
        env:
          SKIP_POSTINSTALL: 1
      - run: npm version ${{ steps.version.outputs.version }}
      - run: npm run build
      - name: Trigger postinstall
        run: npm install --foreground-scripts
        env:
          DEBUG: "inngest:*"
      - run: bin/inngest version
