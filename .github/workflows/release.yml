name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  check-release-type:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: Check if prerelease
        id: check
        run: |
          prerelease=$(echo ${{ github.ref_name }} | awk -F '-' '{print $2}' | awk -F '.' '{print $1}')
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT


  goreleaser:
    runs-on: ubuntu-latest
    needs: [check-release-type]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ./go.mod
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11.1.2
      - name: Set sha
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Set tag
        id: tag
        run: echo "tag=$(git describe --tags `git rev-list --tags --max-count=1`)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Collect PR release notes
        if: needs.check-release-type.outputs.prerelease == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          previous_tag="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)"

          if [ -n "${previous_tag}" ]; then
            release_range="${previous_tag}..${GITHUB_REF_NAME}"
          else
            release_range="${GITHUB_REF_NAME}"
          fi

          scripts/release/collect-pr-notes \
            --range "${release_range}" \
            --repo "${{ github.repository }}" \
            --output /tmp/release-pr-notes.json
      - name: Build release notes
        if: needs.check-release-type.outputs.prerelease == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="$(gh pr list \
            --repo "${{ github.repository }}" \
            --state merged \
            --search "${GITHUB_REF_NAME} type:pr in:title" \
            --json number,title,mergeCommit \
            --jq "map(select(.title == \"chore(release): ${GITHUB_REF_NAME}\" and .mergeCommit.oid == \"${GITHUB_SHA}\")) | .[0].number // empty")"

          release_pr_body_arg=()
          if [ -n "${pr_number}" ]; then
            gh pr view "${pr_number}" \
              --repo "${{ github.repository }}" \
              --json body \
              --jq '.body // ""' > /tmp/release-pr-body.md
            release_pr_body_arg=(--release-pr-body /tmp/release-pr-body.md)
          else
            echo "No merged release PR found for ${GITHUB_REF_NAME} at ${GITHUB_SHA}; building release notes without manual release PR blocks."
          fi

          scripts/release/build-release-notes \
            --notes /tmp/release-pr-notes.json \
            --changelog CHANGELOG.md \
            --tag "${GITHUB_REF_NAME}" \
            "${release_pr_body_arg[@]}" \
            --output /tmp/RELEASE_NOTES.md
      - name: Build prerelease notes
        if: needs.check-release-type.outputs.prerelease != ''
        run: |
          {
            echo "## Prerelease"
            echo
            echo "This prerelease was built from \`${GITHUB_REF_NAME}\`."
            echo
            echo "- Commit: \`$(git rev-parse HEAD)\`"
          } > /tmp/RELEASE_NOTES.md
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "~> v2"
          args: release --clean --verbose --release-notes=/tmp/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
