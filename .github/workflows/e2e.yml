name: SDK E2E Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GOCOVERDIR: "coverage"

jobs:
  ts:
    name: TS SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ./go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11.2.2

      - name: Build UI
        run: make build-ui

      - name: Build dev serve
        run: |
          go build -cover -o ./inngest-bin ./cmd

      - name: Run E2E tests
        run: |
          cd ./tests/js
          pnpm install --frozen-lockfile
          pnpm dev &
          sleep 5
          cd ../../
          echo "Running dev server"
          mkdir $GOCOVERDIR
          nohup ./inngest-bin dev --no-discovery 2> /tmp/devserver-logs-ts.txt &
          echo "Ran dev server"
          sleep 5
          curl http://127.0.0.1:8288/dev > /dev/null 2> /dev/null
          go test ./tests -v
        env:
          INNGEST_SIGNING_KEY: test
          API_URL: http://127.0.0.1:8288
          SDK_URL: http://127.0.0.1:3000/api/inngest
          TEST_MODE: true
          EXPERIMENTAL_KEY_QUEUES_ENABLE: "true"
          LOG_LEVEL: trace

      - name: Convert coverage for tooling
        run: |
          ls -la $GOCOVERDIR
          # pass in all the directories in coverage to be merged
          go tool covdata percent -i=$GOCOVERDIR | tee coverage.txt

      - name: Upload devserver logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devserver-logs-ts
          path: /tmp/devserver-logs-ts.txt
          retention-days: 7

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ts-e2e

  # refs:
  #  - https://go.dev/doc/build-cover
  golang:
    name: "Go SDK / split: ${{ matrix.index }}"
    strategy:
      fail-fast: false
      matrix:
        parallelism: [3]
        index: [0, 1, 2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ./go.mod

      - name: Start postgres container
        run: |
          docker run -d --name inngest-test-postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=inngest_test \
            -p 5432:5432 \
            postgres:17
          # Wait for postgres to be ready
          for i in $(seq 1 30); do
            if docker exec inngest-test-postgres pg_isready -U postgres > /dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: Postgres failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Build dev server
        run: go build -cover -o ./inngest-bin ./cmd

      - name: Install tools
        run: go install tool

      - name: Run E2E tests
        run: |
          echo "Running dev server"
          mkdir $GOCOVERDIR
          nohup ./inngest-bin dev --no-discovery --postgres-uri "postgres://postgres:postgres@localhost:5432/inngest_test?sslmode=disable" 2> /tmp/dev-output.txt &
          echo "Ran dev server"
          sleep 5
          curl http://127.0.0.1:8288/dev > /dev/null 2> /dev/null

          gotesplit -total ${{ matrix.parallelism }} -index ${{ matrix.index }} ./tests/golang -- -v -count=1
        env:
          API_URL: http://127.0.0.1:8288
          INNGEST_EVENT_KEY: test
          INNGEST_SIGNING_KEY: 7468697320697320612074657374206b6579
          INNGEST_DEV: http://127.0.0.1:8288
          TEST_MODE: true
          TEST_DATABASE: postgres
          EXPERIMENTAL_KEY_QUEUES_ENABLE: "true"

      - name: Convert coverage for tooling
        run: |
          ls -la $GOCOVERDIR
          # pass in all the directories in coverage to be merged
          go tool covdata percent -i=$GOCOVERDIR | tee coverage.txt

      - name: Upload devserver logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devserver-logs-golang-split-${{ matrix.index }}
          path: /tmp/dev-output.txt
          retention-days: 7

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: go-e2e,split-${{ matrix.index }}

  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ./go.mod

      - name: Start postgres container
        run: |
          docker run -d --name inngest-test-postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=inngest_test \
            -p 5432:5432 \
            postgres:17
          # Wait for postgres to be ready
          for i in $(seq 1 30); do
            if docker exec inngest-test-postgres pg_isready -U postgres > /dev/null 2>&1; then
              echo "Postgres is ready"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: Postgres failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Build dev server
        run: go build -cover -o ./inngest-bin ./cmd

      - name: Run API tests
        run: |
          echo "Running dev server"
          mkdir $GOCOVERDIR
          nohup ./inngest-bin dev --no-discovery --postgres-uri "postgres://postgres:postgres@localhost:5432/inngest_test?sslmode=disable" 2> /tmp/dev-output.txt &
          echo "Ran dev server"
          sleep 5
          curl http://127.0.0.1:8288/dev > /dev/null 2> /dev/null

          go test ./tests/api/... -v -count=1
        env:
          API_URL: http://127.0.0.1:8288
          INNGEST_EVENT_KEY: test
          INNGEST_SIGNING_KEY: 7468697320697320612074657374206b6579
          INNGEST_DEV: http://127.0.0.1:8288
          TEST_MODE: true
          TEST_DATABASE: postgres
          EXPERIMENTAL_KEY_QUEUES_ENABLE: "true"

      - name: Convert coverage for tooling
        run: |
          ls -la $GOCOVERDIR
          go tool covdata percent -i=$GOCOVERDIR | tee coverage.txt

      - name: Upload devserver logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devserver-logs-api
          path: /tmp/dev-output.txt
          retention-days: 7

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: api-e2e

  execution:
    name: Execution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ./go.mod

      - name: Run execution tests
        run: go test ./tests/execution/... -v -count=1 -coverprofile=coverage.txt
        env:
          EXPERIMENTAL_KEY_QUEUES_ENABLE: "true"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: exec

  e2e-ci:
    name: E2E CI
    if: always()
    needs: [ts, golang, api, execution]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more E2E jobs failed or were cancelled"
            exit 1
          fi
