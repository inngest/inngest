name: Auto-tag Release Commits

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write

env:
  # Use the release bot token so tag pushes trigger the Release workflow.
  GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

concurrency:
  group: release-tag-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  tag-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release/next' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Validate release token
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error title=Missing RELEASE_TOKEN::Configure the release bot token as the RELEASE_TOKEN repository secret."
            exit 1
          fi

      - name: Checkout merged release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          token: ${{ env.GH_TOKEN }}

      - name: Determine release tag
        id: release
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          git fetch --tags origin

          if ! printf '%s\n' "${PR_TITLE}" | grep -Eq '^chore\(release\): v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release PR title is not a valid stable release title: ${PR_TITLE}"
            exit 1
          fi

          tag_name="$(printf '%s\n' "${PR_TITLE}" | sed -E 's/^chore\(release\): (v[0-9]+\.[0-9]+\.[0-9]+)$/\1/')"

          if ! grep -Eq "^## \[${tag_name}\]|^## \[${tag_name#v}\]|^## ${tag_name}$|^## ${tag_name#v}$" CHANGELOG.md; then
            echo "Merged release commit does not contain changelog entry for ${tag_name}"
            exit 1
          fi

          if git rev-parse "${tag_name}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.release.outputs.skip == 'false'
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          if ! printf '%s\n' "${TAG_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag output is invalid: ${TAG_NAME}"
            exit 1
          fi

          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"
