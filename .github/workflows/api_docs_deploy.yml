name: API Docs deploy

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  deploy:
    name: Build and deploy API docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      # Provides Go, protoc, and protoc-gen-openapiv2 — all required by `make docs`.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nicknovitski/nix-develop@9be7cfb4b10451d3390a75dc18ad0465bed4932a # v1.2.1

      # Set up Node 24 + pnpm for the api-docs build.
      # Runs after nix-develop so node 24 takes precedence over nix's node 22.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "11.0.6"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: docs/api-docs/pnpm-lock.yaml

      - name: Generate OpenAPI docs
        run: make docs

      - name: Install dependencies
        working-directory: docs/api-docs
        run: pnpm install

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Build (preview)
        if: inputs.environment == 'preview'
        working-directory: docs/api-docs
        run: vercel build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        if: inputs.environment == 'production'
        working-directory: docs/api-docs
        run: vercel build --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to preview
        if: inputs.environment == 'preview'
        working-directory: docs/api-docs
        run: vercel deploy --prebuilt
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        if: inputs.environment == 'production'
        working-directory: docs/api-docs
        run: vercel deploy --prebuilt --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
