syntax = "proto3";
package state.v2;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/inngest/inngest/proto/gen/state/v2;statev2";

message Metadata {
  ID              id      = 1;
  Config          config  = 2;
  RunMetrics      metrics = 3;
  repeated string stack   = 4;
}

message ID {
  string run_id      = 1;
  string function_id = 2;
  Tenant tenant      = 3;
}

message Config {
  // string                            function_slug    = 1; deprecated
  int64                             function_version = 2;
  string                            cron_schedule    = 3;
  string                            span_id          = 4;
  string                            batch_id         = 5;
  google.protobuf.Timestamp         started_at       = 6;
  repeated string                   event_ids        = 7;
  int64                             request_version  = 8;
  string                            idempotency      = 9;
  optional string                   replay_id        = 10;
  optional string                   original_run_id  = 11;
  optional int64                    priority_factor  = 12;
  repeated ConcurrencyKey           concurrency_keys = 13;
  bool                              force_step_plan  = 14;
  google.protobuf.Struct            context          = 15;
  bool                              has_ai           = 16;
  // semaphores_json stores semaphore constraints as a JSON-encoded string.
  // This avoids a proto schema change while ensuring semaphores survive
  // the state proxy round-trip.
  string                            semaphores_json  = 17;
}

message ConcurrencyKey {
  string key   = 1;
  string hash  = 2;
  int64  limit = 3;
}

message RunMetrics {
  int64 state_size = 1;
  int64 event_size = 2;
  int64 step_count = 3;
}

message Tenant {
  string app_id     = 1;
  string env_id     = 2;
  string account_id = 3;
}

message CreateStateRequest {
  Metadata metadata                  = 1;
  repeated bytes events              = 2;
  repeated bytes steps               = 3;
  repeated bytes steps_inputs        = 4;
}

message CreateStateResponse {
  Metadata           metadata = 1;
  repeated bytes     events   = 2;
  map<string, bytes> steps    = 3;
}

message DeleteStateRequest {
  ID id = 1;
}


message DeleteStateResponse {
  bool deleted = 1;
}

message LoadMetadataRequest {
  ID id = 1;
}

message LoadMetadataResponse {
  Metadata metadata = 1;
}

message UpdateMetadataRequest {
  ID                        id              = 1;
  google.protobuf.Timestamp started_at      = 2;
  int64                     request_version = 3;
  bool                      force_step_plan = 4;
}

message UpdateMetadataResponse{}

message SaveStepRequest {
  ID     id      = 1;
  string step_id = 2;
  bytes  data    = 3;
}

message SaveStepResponse{
  bool has_pending_steps = 1;
}

message SavePendingRequest {
  ID id = 1;
  repeated string pending = 2;
}

message SavePendingResponse {}

message ExistsRequest {
  ID id = 1;
}

message ExistsResponse {
  bool exists = 1;
}

message LoadEventsRequest {
  ID id = 1;
}

message LoadEventsResponse {
  repeated bytes events = 4;
  bool cached = 5;
}


message LoadStepsRequest {
  ID id = 1;
}

message LoadStepsResponse {
  map<string, bytes> steps = 1;
}

message LoadStateRequest {
  ID id = 1;
}

message LoadStateResponse {
  Metadata           metadata = 1;
  repeated bytes     events   = 2;
  map<string, bytes> steps    = 3;
}

// DeferStatus mirrors enums.DeferStatus
enum DeferStatus {
  DEFER_STATUS_UNKNOWN   = 0;
  DEFER_STATUS_SCHEDULED = 1;
  DEFER_STATUS_AFTER_RUN = 2;
  DEFER_STATUS_ABORTED   = 3;
  DEFER_STATUS_REJECTED  = 4;
}

message Defer {
  string      fn_slug         = 1;
  string      hashed_id       = 2;
  DeferStatus schedule_status = 3;
  bytes       input           = 4;
}

message DeferMeta {
  string      fn_slug         = 1;
  string      hashed_id       = 2;
  DeferStatus schedule_status = 3;
}

message SaveDeferRequest {
  ID    id    = 1;
  Defer defer = 2;
}

message SaveDeferResponse {}

message SetDeferStatusRequest {
  ID          id        = 1;
  string      hashed_id = 2;
  DeferStatus status    = 3;
}

message SetDeferStatusResponse {}

message SaveRejectedDeferRequest {
  ID     id        = 1;
  string fn_slug   = 2;
  string hashed_id = 3;
}

message SaveRejectedDeferResponse {}

message LoadDefersRequest {
  ID id = 1;
}

message LoadDefersResponse {
  map<string, Defer> defers = 1;
}

message LoadDefersMetaRequest {
  ID id = 1;
}

message LoadDefersMetaResponse {
  map<string, DeferMeta> defers = 1;
}

message PauseIdentifier {
  string run_id      = 1;
  string function_id = 2;
  string account_id  = 3;
}

// Pause contains only the fields needed to consume a pause.
// Other metadata is ignored.
message Pause {
  string          id           = 1;
  string          workspace_id = 2;
  PauseIdentifier identifier   = 3;
  string          data_key     = 4;
}

message ConsumePauseOpts {
  reserved 1; // removed: idempotency_key
  bytes data = 2;
}

message ConsumePauseResult {
  bool did_consume       = 1;
  bool has_pending_steps = 2;
}

message ConsumePauseRequest {
  Pause            pause = 1;
  ConsumePauseOpts opts  = 2;
}

message ConsumePauseResponse {
  ConsumePauseResult result = 1;
}

service RunService {
  rpc Create(CreateStateRequest) returns (CreateStateResponse) {}
  rpc Delete(DeleteStateRequest) returns (DeleteStateResponse) {}
  rpc Exists(ExistsRequest) returns (ExistsResponse) {}
  rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse) {}
  rpc SaveStep(SaveStepRequest) returns (SaveStepResponse) {}
  rpc SavePending(SavePendingRequest) returns (SavePendingResponse) {}
  rpc ConsumePause(ConsumePauseRequest) returns (ConsumePauseResponse) {}

  rpc SaveDefer(SaveDeferRequest) returns (SaveDeferResponse) {}
  rpc SetDeferStatus(SetDeferStatusRequest) returns (SetDeferStatusResponse) {}
  rpc SaveRejectedDefer(SaveRejectedDeferRequest) returns (SaveRejectedDeferResponse) {}

  rpc LoadMetadata(LoadMetadataRequest) returns (LoadMetadataResponse) {}
  rpc LoadEvents(LoadEventsRequest) returns (LoadEventsResponse) {}
  rpc LoadSteps(LoadStepsRequest) returns (LoadStepsResponse) {}
  rpc LoadState(LoadStateRequest) returns (LoadStateResponse) {}
  rpc LoadDefers(LoadDefersRequest) returns (LoadDefersResponse) {}
  rpc LoadDefersMeta(LoadDefersMetaRequest) returns (LoadDefersMetaResponse) {}
}
