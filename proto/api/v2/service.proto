syntax = "proto3";
package api.v2;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "third_party/google/api/annotations.proto";
import "api/v2/options.proto";
import "third_party/protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/inngest/inngest/proto/gen/api/v2;apiv2";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Inngest REST API v2"
    version: "2.0.0"
    description: "The v2 API delivers a significantly improved developer experience with consistent design patterns and enhanced functionality."
  }
  host: "api.inngest.com"
  base_path: "/v2"
  schemes: HTTPS
  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "Bearer token authentication. Format: `Bearer {key}`"
      }
    }
  }
  tags: { name: "Account"      description: "Manage your account" }
  tags: { name: "Environments" description: "Create and manage environments" }
  tags: { name: "Keys"         description: "Manage event and signing keys" }
  tags: { name: "Webhooks"     description: "Create and manage inbound webhooks" }
  tags: { name: "Apps"         description: "Sync and manage" }
  tags: { name: "Functions"    description: "Invoke and manage functions" }
  tags: { name: "Runs"         description: "Inspect function runs" }
  tags: { name: "Experiments"  description: "Inspect experiment variants and aggregates" }
  tags: { name: "Sessions"     description: "Inspect session-grouped runs" }
  tags: { name: "Partner API"  description: "Partner account management" }
};


service V2 {
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/health"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Health check"
      tags: "Internal"
      description: "Returns the health status of the API service"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
      responses: {
        key: "401"
        value: {
          description: "Unauthorized - authentication required"
          schema: {
            json_schema: {
              ref: "#/definitions/v2ErrorResponse"
            }
          }
        }
      }
      responses: {
        key: "500"
        value: {
          description: "Internal Server Error"
          schema: {
            json_schema: {
              ref: "#/definitions/v2ErrorResponse"
            }
          }
        }
      }
    };
  }

  // Internal method to ensure ErrorResponse schema generation (not exposed via HTTP).
  // The HTTP annotation is required for protoc-gen-openapiv2 to include ErrorResponse
  // in the swagger definitions. This path is stripped by the convert-openapi tool.
  rpc _SchemaOnly(HealthRequest) returns (ErrorResponse) {
    option (google.api.http) = {
      get: "/_internal/schema-only"
    };
  }

