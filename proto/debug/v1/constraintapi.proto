syntax = "proto3";
package debug.v1;

import "constraintapi/v1/service.proto";

option go_package = "github.com/inngest/inngest/proto/gen/debug/v1;debug";

message CheckConstraintsResponse {
  constraintapi.v1.CapacityCheckRequest request = 1;
  constraintapi.v1.CapacityCheckResponse response = 2;
}

message SemaphoreLevel {
  string name = 1;
  string key = 2;
  int64 capacity = 3;
  int64 usage = 4;
  int64 remaining = 5;
}

message SemaphoreLevelRequest {
  string account_id = 1;
  string name = 2;
  string key = 3;
}

message AppSemaphoreLevelRequest {
  string account_id = 1;
  string app_id = 2;
  string key = 3;
}

message FunctionSemaphoreLevelRequest {
  string account_id = 1;
  string function_id = 2;
  string key = 3;
}

message SemaphoreLevelResponse { SemaphoreLevel level = 1; }

message SetSemaphoreLevelRequest {
  string account_id = 1;
  string name = 2;
  string key = 3;
  int64 capacity = 4;
  string idempotency_key = 5;
}

message SetAppSemaphoreLevelRequest {
  string account_id = 1;
  string app_id = 2;
  string key = 3;
  int64 capacity = 4;
  string idempotency_key = 5;
}

message SetFunctionSemaphoreLevelRequest {
  string account_id = 1;
  string function_id = 2;
  string key = 3;
  int64 capacity = 4;
  string idempotency_key = 5;
}

message SetSemaphoreLevelResponse {
  bool applied = 1;
  SemaphoreLevel level = 2;
}
